<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Mapping</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('web.home') }}">Gift Mapping</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('web.dashboard') }}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('web.events') }}">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('web.recipients') }}">Recipients</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('web.gifts') }}">Gifts</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('web.groups') }}">Groups</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('web.users') }}">Users</a></li>
                    {% if session.get('user_id') %}
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('web.logout') }}">Logout</a></li>
                    {% else %}
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('web.login') }}">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('web.register') }}">Register</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
