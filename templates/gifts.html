<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Gifts</title>
</head>
<body>
    <h1>Manage Gift Ideas</h1>

    <!-- Form to create a new gift idea -->
    <form method="POST" action="/gifts">
        <label for="event_id">Event ID:</label>
        <input type="number" id="event_id" name="event_id" required><br>

        <label for="title">Gift Title:</label>
        <input type="text" id="title" name="title" required><br>

        <label for="description">Description:</label>
        <input type="text" id="description" name="description"><br>

        <label for="estimated_cost">Estimated Cost:</label>
        <input type="number" step="0.01" id="estimated_cost" name="estimated_cost"><br>

        <button type="submit">Add Gift Idea</button>
    </form>

    <h2>All Gift Ideas</h2>
    <ul>
        {% for gift in gifts %}
        <li>
            {{ gift.title }} - {{ gift.description }} (Estimated Cost: ${{ gift.estimated_cost }}, Event ID: {{ gift.event_id }})<br>
            <strong>Score:</strong> {{ gift_scores.get(gift.id, 0) }}<br>
            <form method="POST" action="/gifts/vote">
                <input type="hidden" name="user_id" value="1"> <!-- Replace with actual user ID -->
                <input type="hidden" name="gift_idea_id" value="{{ gift.id }}">
                <label for="score">Vote:</label>
                <input type="number" id="score" name="score" min="1" max="5" required>
                <button type="submit">Submit Vote</button>
            </form>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
